<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JJS - MP4 TO CUTSCENE</title>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1a1a; --thickness: 4px; --accent: #ffcc33; }
        * { box-sizing: border-box; font-family: 'Finger Paint', cursive; border-radius: 0 !important; }
        body { margin: 0; background: var(--bg); color: #fff; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 850px; background: #111; border: var(--thickness) solid #000; padding: 30px; box-shadow: 12px 12px 0 #000; margin-bottom: 30px; }
        h1 { color: var(--accent); text-align: center; margin-top: 0; text-transform: uppercase; }
        .section { background: #000; border: 2px solid #333; padding: 20px; margin-bottom: 20px; }
        .section-title { color: var(--accent); font-size: 0.8rem; margin-bottom: 15px; display: block; border-left: 4px solid var(--accent); padding-left: 10px; }
        .row { display: flex; gap: 20px; margin-bottom: 15px; }
        .input-group { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.7rem; color: #888; }
        input[type="text"], input[type="number"] { background: #111; border: 2px solid #333; color: #fff; padding: 12px; font-size: 1rem; outline: none; width: 100%; }
        .btn { width: 100%; background: var(--accent); color: #000; border: var(--thickness) solid #000; padding: 18px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .btn:hover { background: #fff; transform: translate(-2px, -2px); box-shadow: 4px 4px 0 #000; }
        #log { font-family: monospace; font-size: 11px; color: #2ecc71; height: 100px; overflow-y: auto; background: #050505; padding: 10px; border: 1px solid #222; margin-top: 10px; }
        textarea { width: 100%; height: 200px; background: #000; border: 2px solid #333; color: #2ecc71; font-family: monospace; padding: 15px; font-size: 0.8rem; }
        .toggle-group { display: flex; align-items: center; gap: 10px; background: #222; padding: 10px; border: 2px solid #000; margin-bottom: 10px; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" style="color:#666; text-decoration:none; font-size:0.8rem;">< BACK TO HUB</a>
        <h1>STAGE 1: ASSET GEN</h1>
        <div class="section">
            <span class="section-title">IDENTITY</span>
            <input type="text" id="proj-name" placeholder="PROJECT NAME (REQUIRED)">
        </div>
        <div class="row">
            <div class="input-group"><label>FPS</label><input type="number" id="fps-val" value="12"></div>
            <div class="input-group"><label>PREVIEW SPEED</label><input type="number" id="speed-val" value="1.0" step="0.1"></div>
        </div>
        <div class="section">
            <span class="section-title">VIDEO</span>
            <input type="file" id="vid-input" accept="video/mp4" style="width:100%;">
        </div>
        <button id="gen-btn" class="btn" onclick="processVideo()">GENERATE ZIP BUNDLE</button>
        <div id="log">Awaiting input...</div>
    </div>

    <div class="container">
        <h1>STAGE 3: SEQUENCE BUILDER</h1>
        <div class="row">
            <div class="input-group"><label>BUILD FPS</label><input type="number" id="b-fps" value="12"></div>
            <div class="input-group"><label>BUILD SPEED</label><input type="number" id="b-speed" value="1.0" step="0.1"></div>
        </div>
        <div class="row">
            <label class="toggle-group" style="flex:1"><input type="checkbox" id="preloading"> PRELOADING</label>
            <label class="toggle-group" style="flex:1"><input type="checkbox" id="transparent"> TRANSPARENT</label>
        </div>
        <textarea id="io-box" placeholder="PASTE uploaded_image_ids.txt HERE..."></textarea>
        <button class="btn" style="margin-top: 15px; background: #2ecc71;" onclick="buildJJS()">COMPILE JJS CODE</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: false });
        
        async function processVideo() {
            const name = document.getElementById('proj-name').value.trim();
            const file = document.getElementById('vid-input').files[0];
            if(!name || !file) return alert("Fill all fields!");
            
            document.getElementById('gen-btn').disabled = true;
            if(!ffmpeg.isLoaded()) await ffmpeg.load();
            
            ffmpeg.FS('writeFile', 'in.mp4', await fetchFile(file));
            await ffmpeg.run('-i', 'in.mp4', '-vf', `fps=${document.getElementById('fps-val').value}`, 'f_%03d.png');
            await ffmpeg.run('-i', 'in.mp4', '-vf', `fps=${document.getElementById('fps-val').value},scale=320:-1`, 'prev.gif');

            const zip = new JSZip();
            const fDir = zip.folder("frames");
            ffmpeg.FS('readdir', '.').forEach(f => {
                if(f.endsWith('.png')) fDir.file(f, ffmpeg.FS('readFile', f));
            });
            zip.file("preview.gif", ffmpeg.FS('readFile', 'prev.gif'));

            try {
                const [py, gt, bat] = await Promise.all([
                    fetch('./cutscenepresets/upload_tool.py'),
                    fetch('./cutscenepresets/guide.txt'),
                    fetch('./cutscenepresets/run_uploader.bat')
                ]);
                zip.file("upload_tool.py", await py.text());
                zip.file("guide.txt", await gt.text());
                zip.file("run_uploader.bat", await bat.text());
            } catch(e) {}

            const blob = await zip.generateAsync({type:"blob"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${name}_Package.zip`;
            a.click();
            document.getElementById('gen-btn').disabled = false;
        }

        function buildJJS() {
            const raw = document.getElementById('io-box').value.trim();
            const fps = parseFloat(document.getElementById('b-fps').value);
            const speed = parseFloat(document.getElementById('b-speed').value);
            const isPreload = document.getElementById('preloading').checked;
            const isTrans = document.getElementById('transparent').checked;

            const waitTime = parseFloat((1 / fps / speed).toFixed(5));
            const overlayTime = isTrans ? waitTime : parseFloat((waitTime + 0.05).toFixed(5));
            
            const lines = raw.split('\n').filter(l => l.includes('--'));
            let nodes = [];

            // 1. PRELOADING STAGE
            if(isPreload) {
                lines.forEach(line => {
                    nodes.push({ "TEXTURE": parseInt(line.split('--')[1].trim()), "TIME": 0, "K_NAME": "VISUAL", "EFFECT": "Overlay" });
                });
                nodes.push({ "TIME": 0, "K_NAME": "WAIT" });
            }

            // 2. BACKGROUND STAGE (Black screen if not transparent)
            if(!isTrans) {
                nodes.push({ "COLOR": "0, 0, 0", "TIME": parseFloat((lines.length * waitTime).toFixed(5)), "K_NAME": "VISUAL", "EFFECT": "Screen Color" });
                nodes.push({ "TIME": 0, "K_NAME": "WAIT" });
            }

            // 3. MAIN SEQUENCE
            lines.forEach(line => {
                nodes.push({ "TEXTURE": parseInt(line.split('--')[1].trim()), "TIME": overlayTime, "K_NAME": "VISUAL", "EFFECT": "Overlay" });
                nodes.push({ "TIME": waitTime, "K_NAME": "WAIT" });
            });

            const final = [{"NAME": "Cutscene", "K_NAME": "SKILL", "DATA": JSON.stringify({"Line": nodes})}];
            document.getElementById('io-box').value = JSON.stringify(final, null, 2);
            alert("Success!");
        }
    </script>
</body>
</html>
