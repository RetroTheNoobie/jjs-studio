<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JJS - MP4 TO CUTSCENE</title>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1a1a; --thickness: 4px; --accent: #ffcc33; }
        * { box-sizing: border-box; font-family: 'Finger Paint', cursive; border-radius: 0 !important; }
        body { margin: 0; background: var(--bg); color: #fff; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 850px; background: #111; border: var(--thickness) solid #000; padding: 30px; box-shadow: 12px 12px 0 #000; margin-bottom: 30px; position: relative; }
        
        /* Main Title Styling */
        .main-title { color: var(--accent); text-align: center; margin: 0 0 30px 0; text-transform: uppercase; font-size: 2.5rem; text-shadow: 4px 4px 0px #000; }
        
        h2 { color: var(--accent); text-align: center; margin-top: 0; text-transform: uppercase; font-size: 1.5rem; }
        
        .section { background: #000; border: 2px solid #333; padding: 20px; margin-bottom: 20px; }
        .section-title { color: var(--accent); font-size: 0.8rem; margin-bottom: 15px; display: block; border-left: 4px solid var(--accent); padding-left: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .row { display: flex; gap: 20px; margin-bottom: 15px; }
        .input-group { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        
        input[type="text"], input[type="number"] { background: #111; border: 2px solid #333; color: #fff; padding: 12px; font-size: 1rem; outline: none; width: 100%; }
        input:focus { border-color: var(--accent); }
        
        .btn { width: 100%; background: var(--accent); color: #000; border: var(--thickness) solid #000; padding: 18px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.1s; }
        .btn:hover { background: #fff; transform: translate(-2px, -2px); box-shadow: 4px 4px 0 #000; }
        .btn:disabled { background: #444; cursor: not-allowed; }
        
        #log { font-family: monospace; font-size: 11px; color: #2ecc71; height: 100px; overflow-y: auto; background: #050505; padding: 10px; border: 1px solid #222; margin-top: 10px; }
        textarea { width: 100%; height: 200px; background: #000; border: 2px solid #333; color: #2ecc71; font-family: monospace; padding: 15px; font-size: 0.8rem; outline: none; }
        
        .toggle-group { display: flex; align-items: center; gap: 10px; background: #1a1a1a; padding: 12px; border: 2px solid #333; margin-bottom: 10px; cursor: pointer; font-size: 0.75rem; transition: 0.2s; }
        .toggle-group:hover { border-color: var(--accent); }
        .toggle-group input { cursor: pointer; }

        .step-tag { background: var(--accent); color: #000; padding: 2px 10px; font-size: 0.7rem; font-weight: bold; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

    <h1 class="main-title">MP4 CUTSCENE ENGINE</h1>

    <div class="container">
        <a href="index.html" style="color:#666; text-decoration:none; font-size:0.8rem; margin-bottom: 20px; display: block;">&lt; BACK TO HUB</a>
        <div class="step-tag">PART 1: ASSET EXTRACTION</div>
        <h2>EXTRACT FRAMES</h2>
        
        <div class="section">
            <span class="section-title">Project Identity</span>
            <div class="input-group">
                <label>Cutscene Name</label>
                <input type="text" id="proj-name" placeholder="e.g. Domain_Expansion_VFX">
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <label>Sampling FPS (Standard: 12)</label>
                <input type="number" id="fps-val" value="12">
            </div>
            <div class="input-group">
                <label>Preview Speed</label>
                <input type="number" id="speed-val" value="1.0" step="0.1">
            </div>
        </div>

        <div class="section">
            <span class="section-title">Video Source (MP4)</span>
            <input type="file" id="vid-input" accept="video/mp4" style="width:100%; cursor: pointer;">
        </div>

        <button id="gen-btn" class="btn" onclick="processVideo()">GENERATE ASSET BUNDLE</button>
        <div id="log">Awaiting user input...</div>
    </div>

    <div class="container">
        <div class="step-tag">PART 2: SEQUENCE COMPILER</div>
        <h2>JJS CODE GENERATOR</h2>
        <p style="font-size: 0.7rem; color: #888; text-align: center; margin-bottom: 20px;">
            After running the Python script, paste the contents of your <b>uploaded_image_ids.txt</b> below.
        </p>
        
        <div class="row">
            <div class="input-group">
                <label>Build FPS (Match Part 1)</label>
                <input type="number" id="b-fps" value="12">
            </div>
            <div class="input-group">
                <label>Playback Speed</label>
                <input type="number" id="b-speed" value="1.0" step="0.1">
            </div>
        </div>

        <div class="row">
            <label class="toggle-group" style="flex:1"><input type="checkbox" id="preloading"> ENABLE PRELOADING</label>
            <label class="toggle-group" style="flex:1"><input type="checkbox" id="transparent"> TRANSPARENT MODE</label>
        </div>

        <textarea id="io-box" placeholder="PASTE DATA HERE... (Example: frame_001 -- 138472042664054)"></textarea>
        <button class="btn" style="margin-top: 15px; background: #2ecc71;" onclick="buildJJS()">COMPILE JJS DATA</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: false });
        const logBox = document.getElementById('log');

        function addLog(m) {
            logBox.innerText += `\n> ${m}`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        async function processVideo() {
            const name = document.getElementById('proj-name').value.trim();
            const file = document.getElementById('vid-input').files[0];
            const fps = document.getElementById('fps-val').value;

            if(!name || !file) return alert("Please provide a name and a video file!");

            const btn = document.getElementById('gen-btn');
            btn.disabled = true;

            if(!ffmpeg.isLoaded()) {
                addLog("Initializing FFmpeg...");
                await ffmpeg.load();
            }

            addLog("Reading Video...");
            ffmpeg.FS('writeFile', 'in.mp4', await fetchFile(file));

            addLog("Splitting into PNGs...");
            await ffmpeg.run('-i', 'in.mp4', '-vf', `fps=${fps}`, 'f_%03d.png');

            addLog("Creating Preview GIF...");
            await ffmpeg.run('-i', 'in.mp4', '-vf', `fps=${fps},scale=320:-1`, 'prev.gif');

            addLog("Packaging Bundle...");
            const zip = new JSZip();
            const fDir = zip.folder("frames");
            const fs = ffmpeg.FS('readdir', '.');
            
            fs.forEach(f => {
                if(f.endsWith('.png')) fDir.file(f, ffmpeg.FS('readFile', f));
            });
            zip.file("preview.gif", ffmpeg.FS('readFile', 'prev.gif'));

            try {
                const [py, gt, bat] = await Promise.all([
                    fetch('./cutscenepresets/upload_tool.py'),
                    fetch('./cutscenepresets/guide.txt'),
                    fetch('./cutscenepresets/run_uploader.bat')
                ]);
                if(py.ok) zip.file("upload_tool.py", await py.text());
                if(gt.ok) zip.file("guide.txt", await gt.text());
                if(bat.ok) zip.file("run_uploader.bat", await bat.text());
            } catch(e) { addLog("Local presets fetch failed, proceeding with frames only."); }

            const blob = await zip.generateAsync({type:"blob"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${name}_JJS_Bundle.zip`;
            a.click();

            addLog("SUCCESS: Bundle downloaded.");
            btn.disabled = false;
        }

        function buildJJS() {
            const raw = document.getElementById('io-box').value.trim();
            const fps = parseFloat(document.getElementById('b-fps').value);
            const speed = parseFloat(document.getElementById('b-speed').value);
            const isPreload = document.getElementById('preloading').checked;
            const isTrans = document.getElementById('transparent').checked;
            
            if(!raw) return alert("Input box is empty!");

            const waitTime = parseFloat((1 / fps / speed).toFixed(5));
            const overlayTime = isTrans ? waitTime : parseFloat((waitTime + 0.05).toFixed(5));
            const lines = raw.split('\n').filter(l => l.includes('--'));
            let nodes = [];

            if(isPreload) {
                lines.forEach(line => {
                    nodes.push({ "TEXTURE": parseInt(line.split('--')[1].trim()), "TIME": 0, "K_NAME": "VISUAL", "EFFECT": "Overlay" });
                });
                nodes.push({ "TIME": 0, "K_NAME": "WAIT" });
            }

            if(!isTrans) {
                nodes.push({ "COLOR": "0, 0, 0", "TIME": parseFloat((lines.length * waitTime).toFixed(5)), "K_NAME": "VISUAL", "EFFECT": "Screen Color" });
                nodes.push({ "TIME": 0, "K_NAME": "WAIT" });
            }

            lines.forEach(line => {
                const id = line.split('--')[1].trim();
                nodes.push({
                    "TEXTURE": parseInt(id),
                    "TIME": overlayTime,
                    "K_NAME": "VISUAL",
                    "EFFECT": "Overlay"
                });
                nodes.push({ "TIME": waitTime, "K_NAME": "WAIT" });
            });

            const final = [{"NAME": "Cutscene", "K_NAME": "SKILL", "DATA": JSON.stringify({"Line": nodes})}];
            document.getElementById('io-box').value = JSON.stringify(final, null, 2);
            alert("JJS Data Compiled Successfully!");
        }
    </script>
</body>
</html>
