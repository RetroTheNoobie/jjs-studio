<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JJS - CHOPPIFY ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1a1a; --thickness: 4px; --accent: #ffcc33; --btn-bg: #252525; }
        * { box-sizing: border-box; font-family: 'Finger Paint', cursive; border-radius: 0 !important; }
        body { margin: 0; background: var(--bg); color: #fff; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; background: #111; border: var(--thickness) solid #000; padding: 30px; box-shadow: 12px 12px 0 #000; }
        h1 { color: var(--accent); text-align: center; margin-top: 0; }
        .guide { background: #000; padding: 15px; border: 2px solid #333; font-size: 0.8rem; color: #bbb; margin-bottom: 25px; line-height: 1.4; }
        .row { display: flex; gap: 20px; margin-bottom: 20px; align-items: center; }
        .input-group { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.9rem; color: var(--accent); }
        input, textarea { background: #000; border: var(--thickness) solid #000; color: #fff; padding: 12px; font-size: 1rem; outline: none; }
        input:disabled { color: #444; border-color: #222; }
        textarea { width: 100%; height: 250px; resize: vertical; font-family: monospace; font-size: 0.75rem; color: #2ecc71; }
        .process-btn { width: 100%; background: var(--accent); color: #000; border: var(--thickness) solid #000; padding: 20px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .process-btn:hover { background: #fff; transform: translate(-2px, -2px); box-shadow: 5px 5px 0 #000; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #666; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-link">< BACK TO HUB</a>
        <h1>ANIM CHOPPIFY</h1>

        <div class="guide">
            <strong>CHOPPIFY ENGINE:</strong> Paste your export code below. The export code must contain a skill node/container called <strong>"Choppy"</strong>, inside of it it should have atleast 1 animation node, it will take the <strong>first</strong> ANIM node, and converts it into low fps 8 bit anim
        </div>

        <div class="row">
            <div class="input-group">
                <label><input type="radio" name="mode" value="fps" checked onclick="toggle()"> FPS MODE</label>
                <input type="number" id="fps-val" value="24">
            </div>
            <div class="input-group">
                <label><input type="radio" name="mode" value="set" onclick="toggle()"> SET AMOUNT</label>
                <input type="number" id="set-val" value="0.05" step="0.01" disabled>
            </div>
            <div class="input-group">
                <label>SPEED</label>
                <input type="number" id="speed-val" value="1.0" step="0.1">
            </div>
        </div>

        <textarea id="io-area" placeholder="PASTE KLUv DATA HERE..."></textarea>
        <button class="process-btn" onclick="runChoppify()">PROCESS & RE-COMPRESS</button>
    </div>

    <script src="./zstd-bundle.js"></script>
    <script>
        let zstd = null;
        async function init() {
            const engine = window.ZstdWeb || window.zstd || window.Zstd;
            if (engine?.init) { await engine.init(); zstd = engine; }
        }
        init();

        function toggle() {
            const isFPS = document.querySelector('input[name="mode"][value="fps"]').checked;
            document.getElementById('fps-val').disabled = !isFPS;
            document.getElementById('set-val').disabled = isFPS;
        }

        const fix = (num) => parseFloat(num.toFixed(5));

        function runChoppify() {
            if (!zstd) return alert("Zstd Engine not loaded yet!");
            let rawInput = document.getElementById('io-area').value.trim();
            if(!rawInput) return;

            let currentMoves;
            let isCompressed = false;

            try {
                if (rawInput.startsWith('[') || rawInput.startsWith('{')) {
                    currentMoves = JSON.parse(rawInput);
                } else {
                    const bin = Uint8Array.from(atob(rawInput), c => c.charCodeAt(0));
                    currentMoves = JSON.parse(new TextDecoder().decode(zstd.decompress(bin)));
                    isCompressed = true;
                }
            } catch(e) {
                return alert("Import Failed: Check your data.");
            }

            let move = currentMoves.find(m => m.NAME === "Choppy");
            if(!move) return alert("No container named 'Choppy' found!");

            let innerData = JSON.parse(move.DATA);
            let lines = innerData.Line;
            
            let animIndex = lines.findIndex(l => l.K_NAME === "ANIM");
            if(animIndex === -1) return alert("No ANIM node found in 'Choppy'!");

            let targetAnim = lines[animIndex];
            let start = fix(targetAnim.PREVIEW[0]);
            let end = fix(targetAnim.PREVIEW[1]);
            let animId = targetAnim.ANIM_USE;

            const isFPS = document.querySelector('input[name="mode"][value="fps"]').checked;
            const speed = parseFloat(document.getElementById('speed-val').value) || 1;
            
            let interval = isFPS ? fix(1 / parseFloat(document.getElementById('fps-val').value)) : fix(parseFloat(document.getElementById('set-val').value));
            let waitTime = fix(interval / speed);

            let newNodes = [];
            for(let t = start; t < end; t = fix(t + interval)) {
                let fEnd = fix(Math.min(t + interval, end));
                
                newNodes.push({
                    "PREVIEW": [fix(t), fEnd],
                    "K_NAME": "ANIM",
                    "ANIM_USE": animId,
                    "SPEED": 0
                });
                
                newNodes.push({
                    "K_NAME": "WAIT",
                    "TIME": waitTime
                });
            }

            lines.splice(animIndex, 1, ...newNodes);
            innerData.Line = lines;
            move.DATA = JSON.stringify(innerData);

            if (isCompressed) {
                const bin = zstd.compress(new TextEncoder().encode(JSON.stringify(currentMoves)), 3);
                let str = "";
                for (let i = 0; i < bin.length; i++) str += String.fromCharCode(bin[i]);
                document.getElementById('io-area').value = btoa(str);
                alert("Success: code can be found in the import box");
            } else {
                document.getElementById('io-area').value = JSON.stringify(currentMoves, null, 2);
                alert("Success: JSON updated!");
            }
        }
    </script>
</body>
</html>
