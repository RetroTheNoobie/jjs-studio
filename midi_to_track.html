<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JJS - MIDI TO TRACK COMPILER</title>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1a1a; --thickness: 4px; --accent: #ffcc33; --btn-bg: #252525; }
        * { box-sizing: border-box; font-family: 'Finger Paint', cursive; border-radius: 0 !important; }
        body { margin: 0; background: var(--bg); color: #fff; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; background: #111; border: var(--thickness) solid #000; padding: 30px; box-shadow: 12px 12px 0 #000; }
        h1 { color: var(--accent); text-align: center; margin-top: 0; }
        .guide { background: #000; padding: 15px; border: 2px solid #333; font-size: 0.8rem; color: #bbb; margin-bottom: 25px; line-height: 1.4; }
        .row { display: flex; gap: 20px; margin-bottom: 20px; align-items: center; }
        .input-group { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.9rem; color: var(--accent); }
        input, textarea { background: #000; border: var(--thickness) solid #000; color: #fff; padding: 12px; font-size: 1rem; outline: none; }
        .file-upload-zone { border: var(--thickness) dashed var(--accent); background: #000; padding: 30px; text-align: center; cursor: pointer; margin-bottom: 20px; transition: background 0.2s; }
        .file-upload-zone:hover { background: #151515; }
        #file-input { display: none; }
        textarea { width: 100%; height: 250px; resize: vertical; font-family: monospace; font-size: 0.75rem; color: #2ecc71; }
        .process-btn { width: 100%; background: var(--accent); color: #000; border: var(--thickness) solid #000; padding: 20px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .process-btn:hover { background: #fff; transform: translate(-2px, -2px); box-shadow: 5px 5px 0 #000; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #666; text-decoration: none; font-size: 0.8rem; }
    </style>
    <script src="https://unpkg.com/@tonejs/midi"></script>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-link">< BACK TO HUB</a>
        <h1>MIDI TO TRACK</h1>

        <div class="guide">
            <strong>AUDIO COMPILER (v1.2):</strong> Drop your <strong>.mid</strong> file. This build applies a 4-second full audio-clip window to prevent notes from cutting short, and includes a customizable global volume configuration.
        </div>

        <div class="row">
            <div class="input-group">
                <label>GLOBAL TRACK VOLUME</label>
                <input type="number" id="volume-val" value="1.0" min="0.0" max="1.0" step="0.1">
            </div>
        </div>

        <div class="file-upload-zone" id="drop-zone">
            CLICK OR DRAG & DROP A MIDI FILE HERE
            <input type="file" id="file-input" accept=".mid,.midi">
        </div>

        <textarea id="io-area" placeholder="COMPILED KLUv EXPORT DATA WILL APPEAR HERE..." readonly></textarea>
        <button class="process-btn" id="copy-btn" onclick="copyToClipboard()">COPY OUTPUT DATA</button>
    </div>

    <script src="./zstd-bundle.js"></script>
    <script>
        let zstd = null;
        async function init() {
            const engine = window.ZstdWeb || window.zstd || window.Zstd;
            if (engine?.init) { await engine.init(); zstd = engine; }
        }
        init();

        const LOCAL_SOUNDS = [233836579, 233844049, 233845680, 233852841, 233854135, 233856105];

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const ioArea = document.getElementById('io-area');

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            if (e.dataTransfer.files.length) processSelectedFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) processSelectedFile(e.target.files[0]);
        });

        function copyToClipboard() {
            const txt = ioArea.value.trim();
            if(!txt) return;
            ioArea.select();
            document.execCommand('copy');
            alert("Success: Copied tracking string to clipboard!");
        }

        function processSelectedFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const midi = new Midi(e.target.result);
                    compileMidiEngine(midi);
                } catch (err) {
                    alert("Parsing Error: Could not read MIDI structure.");
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function compileMidiEngine(midi) {
            let allNotes = [];
            const globalVolume = parseFloat(document.getElementById('volume-val').value) ?? 1.0;

            midi.tracks.forEach(track => {
                track.notes.forEach(note => {
                    allNotes.push({
                        midiNum: note.midi,
                        time: note.time
                    });
                });
            });

            allNotes.sort((a, b) => a.time - b.time);

            if (allNotes.length === 0) {
                return alert("Import Error: No music notes parsed from this MIDI file.");
            }

            const jjsLine = [];
            let currentTime = 0;
            let noteIndex = 0;

            while (noteIndex < allNotes.length) {
                const currentEventTime = allNotes[noteIndex].time;
                const cluster = [];

                // 15ms chord tolerance optimization group window
                while (noteIndex < allNotes.length && Math.abs(allNotes[noteIndex].time - currentEventTime) < 0.015) {
                    cluster.push(allNotes[noteIndex]);
                    noteIndex++;
                }

                // Process timeline WAIT spacing
                const timeDifference = currentEventTime - currentTime;
                if (timeDifference > 0.01) {
                    jjsLine.push({
                        "TIME": parseFloat(timeDifference.toFixed(3)),
                        "K_NAME": "WAIT"
                    });
                    currentTime = currentEventTime;
                }

                // Build out parallel note elements
                cluster.forEach(note => {
                    const pianoNote = note.midiNum - 35; 

                    if (pianoNote >= 1 && pianoNote <= 61) {
                        const trackNote = ((pianoNote - 1) % 12) + 1;
                        const soundIndex = Math.ceil(trackNote / 2) - 1;
                        const octave = Math.ceil(pianoNote / 12);
                        
                        const baseOffset = 16 * (octave - 1) + 8 * (1 - (trackNote % 2));
                        const padding = (octave - 0.9) / 15;
                        const startTime = parseFloat((baseOffset + padding).toFixed(3));
                        
                        // FIX: Force the END parameter to the max possible duration (4 seconds out) 
                        // so notes play their natural decay wave entirely without cutoff boundaries!
                        const endTime = parseFloat((startTime + 4.0).toFixed(3));

                        jjsLine.push({
                            "END": endTime,
                            "K_NAME": "SFX",
                            "ID": LOCAL_SOUNDS[soundIndex],
                            "START": startTime,
                            "VOLUME": globalVolume // Apply user interface volume level configuration
                        });
                    }
                });

                // Append song interrupt cancel validation tag tracker
                jjsLine.push({
                    "ADD/REMOVE": false,
                    "TAG": "cancelsong",
                    "SET": false,
                    "K_NAME": "TAG",
                    "BRANCH": "end",
                    "CHECK": true,
                    "VALUE": "1"
                });
            }

            jjsLine.push({
                "BRANCH": "end",
                "K_NAME": "BRANCH"
            });

            const finalMovesStructure = [
                {
                    "ADD": false,
                    "NAME": "MUSIC",
                    "K_NAME": "SKILL",
                    "KEY": 1,
                    "DATA": JSON.stringify({
                        "Req": [],
                        "Line": jjsLine,
                        "Prop": [],
                        "Branch": {
                            "end": {
                                "Line": [],
                                "Req": []
                            }
                        }
                    }),
                    "COOLDOWN": 0
                }
            ];

            try {
                if (!zstd) {
                    ioArea.value = JSON.stringify(finalMovesStructure, null, 2);
                    alert("Warning: Code rendered in plain text format because Zstandard was busy.");
                } else {
                    const bin = zstd.compress(new TextEncoder().encode(JSON.stringify(finalMovesStructure)), 3);
                    let str = "";
                    for (let i = 0; i < bin.length; i++) str += String.fromCharCode(bin[i]);
                    
                    ioArea.value = btoa(str);
                    alert(`Success: Track compiled! Optimized layout density to ${jjsLine.length} structural items.`);
                }
            } catch(encodeError) {
                alert("Compression Failure: Error packing binary track strings.");
            }
        }
    </script>
</body>
</html>
