<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JJS STUDIO V1.5.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --panel: #0f0f0f; --accent: #ffcc33; --text: #e0e0e0; --border: #222; }
        * { font-family: 'Finger Paint', cursive; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 350px; background: var(--panel); border-right: 2px solid var(--border); display: flex; flex-direction: column; }
        .io-area { padding: 20px; border-bottom: 1px solid var(--border); }
        textarea { width: 100%; height: 80px; background: #000; color: #2ecc71; border: 1px solid #333; border-radius: 8px; font-size: 10px; resize: none; margin-bottom: 10px; padding: 8px; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 5px; text-transform: uppercase; }
        .list { flex: 1; overflow-y: auto; padding: 15px; }
        .item { padding: 12px; background: #111; margin-bottom: 8px; border-radius: 10px; cursor: pointer; border-left: 4px solid transparent; }
        .item.active { border-left-color: var(--accent); background: #1a1a1a; }
        .item .kname { font-size: 0.6rem; color: var(--accent); display: block; }

        .main { flex: 1; overflow-y: auto; padding: 30px; }
        .node-container { background: #111; border: 1px solid #222; border-radius: 15px; margin-bottom: 25px; overflow: hidden; }
        .node-header { background: #1a1a1a; padding: 10px 20px; color: var(--accent); border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .node-body { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
        
        .prop-box { background: #080808; padding: 8px; border-radius: 6px; border: 1px solid #1a1a1a; }
        .prop-box label { font-size: 10px; color: #555; display: block; margin-bottom: 3px; }
        .prop-box input { background: transparent; border: none; color: #fff; width: 100%; outline: none; border-bottom: 1px solid #333; }
        
        .empty-msg { text-align: center; margin-top: 100px; opacity: 0.3; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="io-area">
        <textarea id="io" placeholder="PASTE KLUV..."></textarea>
        <button class="btn" style="background: var(--accent);" onclick="doImport()">LOAD CHARACTER</button>
        <button class="btn" style="background: #2ecc71; color:#fff;" onclick="doExport()">SAVE KLUV</button>
    </div>
    <div class="list" id="sidebar-list"></div>
</div>

<div class="main" id="main-editor">
    <div class="empty-msg"><h1>SELECT A CONTAINER</h1></div>
</div>

<script src="./zstd-bundle.js"></script>
<script>
    let rawData = [];
    let activeIdx = 0;
    let zstd = null;

    // THE TERMINOLOGY FIXES
    const PRETTY_NODES = {
        "ULTGIB": "ADD AWAKENING",
        "HPGIB": "ADD HEALTH",
        "EVGIB": "ADD EVASION",
        "ATK": "ATTACK",
        "ANIM": "ANIMATION",
        "VELO": "VELOCITY",
        "PROJ": "PROJECTILE"
    };

    async function init() {
        const engine = window.ZstdWeb || window.zstd || window.Zstd;
        if (engine?.init) { await engine.init(); zstd = engine; }
    }

    function doImport() {
        try {
            const str = document.getElementById('io').value.trim();
            const bin = Uint8Array.from(atob(str), c => c.charCodeAt(0));
            rawData = JSON.parse(new TextDecoder().decode(zstd.decompress(bin)));
            renderSidebar();
            loadContainer(0);
        } catch(e) { alert("Invalid KLUv String"); }
    }

    function renderSidebar() {
        const list = document.getElementById('sidebar-list');
        list.innerHTML = rawData.map((c, i) => `
            <div class="item ${i === activeIdx ? 'active' : ''}" onclick="loadContainer(${i})">
                <span class="kname">${c.K_NAME || "CATEGORY"}</span>
                <strong>${c.NAME || "Entry " + i}</strong>
            </div>
        `).join('');
    }

    function loadContainer(index) {
        activeIdx = index;
        renderSidebar();
        const container = rawData[index];
        const editor = document.getElementById('main-editor');
        
        let nodes = [];
        if (Array.isArray(container.Line)) nodes = container.Line;
        else if (container.DATA) {
            try {
                const parsed = typeof container.DATA === 'string' ? JSON.parse(container.DATA) : container.DATA;
                nodes = parsed.Line || [];
            } catch(e) { nodes = []; }
        }

        if (nodes.length === 0) {
            editor.innerHTML = `<div class="empty-msg"><h3>No nodes found.</h3></div>`;
            return;
        }

        editor.innerHTML = nodes.map((n, ni) => `
            <div class="node-container">
                <div class="node-header">
                    <strong>${PRETTY_NODES[n.K_NAME] || n.K_NAME}</strong>
                    <span style="font-size: 0.7rem; opacity: 0.5;">RAW: ${n.K_NAME}</span>
                </div>
                <div class="node-body">
                    ${Object.keys(n).map(k => k === 'K_NAME' ? '' : `
                        <div class="prop-box">
                            <label>${k}</label>
                            <input value="${n[k]}" onchange="updateNode(${ni}, '${k}', this.value)">
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function updateNode(nIdx, key, val) {
        const container = rawData[activeIdx];
        let targetList = Array.isArray(container.Line) ? container.Line : JSON.parse(container.DATA).Line;

        const finalVal = (val === "true") ? true : (val === "false") ? false : (isNaN(val) || val === "") ? val : parseFloat(val);
        targetList[nIdx][key] = finalVal;
        
        if (!Array.isArray(container.Line)) {
            let inner = JSON.parse(container.DATA);
            inner.Line = targetList;
            container.DATA = JSON.stringify(inner);
        }
    }

    function doExport() {
        const bin = zstd.compress(new TextEncoder().encode(JSON.stringify(rawData)), 3);
        let str = "";
        for (let i = 0; i < bin.length; i++) str += String.fromCharCode(bin[i]);
        document.getElementById('io').value = btoa(str);
    }

    setTimeout(init, 500);
</script>
</body>
</html>
