<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JJS STUDIO V1.2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">
    
    <!-- Using Unpkg as a more stable fallback for the Zstd WASM library -->
    <script src="https://unpkg.com/zstd-codec@0.1.2/dist/zstd-codec.js"></script>

    <style>
        :root { --bg: #0a0a0a; --panel: #141414; --accent: #ffcc33; --text: #ffffff; --border: #333; --node-bg: #1a1a1a; }
        * { font-family: 'Finger Paint', cursive; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--panel); padding: 10px 20px; border-bottom: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .layout { display: grid; grid-template-columns: 380px 1fr; flex: 1; overflow: hidden; }
        .sidebar { background: var(--panel); border-right: 2px solid var(--border); padding: 15px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        textarea { width: 100%; height: 140px; background: #000; color: #00ff00; border: 2px solid #333; padding: 12px; font-size: 11px; border-radius: 8px; resize: none; outline: none; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { border: none; padding: 14px; font-size: 0.85rem; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .import-btn { background: var(--accent); color: #000; }
        .export-btn { background: #28a745; color: #fff; }
        .main-view { padding: 25px; background: #0c0c0c; overflow-y: auto; }
        .node-card { background: var(--node-bg); border: 2px solid var(--border); border-radius: 12px; margin-bottom: 25px; }
        .node-header { background: #252525; padding: 10px 15px; border-bottom: 2px solid var(--border); color: var(--accent); }
        .node-body { padding: 20px; display: flex; flex-wrap: wrap; gap: 12px; }
        .prop-box { background: #222; border: 1px solid #333; padding: 10px; border-radius: 8px; flex: 1 1 160px; }
        .label { color: var(--accent); font-size: 0.65rem; display: block; opacity: 0.8; }
        .prop-input { background: transparent; border: none; border-bottom: 2px solid #444; color: #fff; width: 100%; font-size: 0.9rem; outline: none; }
        #engine-status { font-size: 0.8rem; padding: 5px 10px; border-radius: 4px; background: #222; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 1.4rem; color: var(--accent);">JJS STUDIO V1.2.0</div>
    <div id="engine-status">CHECKING ENGINE...</div>
</header>

<div class="layout">
    <div class="sidebar">
        <textarea id="io-box" placeholder="Paste KLUv here..."></textarea>
        <div class="btn-group">
            <button class="btn import-btn" onclick="importKLUv()">IMPORT</button>
            <button class="btn export-btn" onclick="exportKLUv()">EXPORT</button>
        </div>
        <div id="container-list"></div>
    </div>
    <div class="main-view" id="node-editor">
        <h2 style="color: #444; text-align: center; margin-top: 100px;">Paste code to start editing</h2>
    </div>
</div>

<script>
    let zstdEngine = null;

    // The Handshake: Only runs when the external script is actually present
    function initEngine() {
        const statusEl = document.getElementById('engine-status');
        if (typeof ZstdCodec !== 'undefined') {
            statusEl.innerText = "LOADING WASM...";
            statusEl.style.color = "#ffcc33";
            
            ZstdCodec.run(z => {
                zstdEngine = {
                    compressor: new z.Simple(),
                    decompressor: new z.Simple()
                };
                statusEl.innerText = "ZSTD ENGINE: ONLINE (R/W)";
                statusEl.style.color = "#28a745";
            });
        } else {
            statusEl.innerText = "ZSTD ENGINE: ERROR (SCRIPT BLOCKED)";
            statusEl.style.color = "#ff4444";
            statusEl.style.cursor = "pointer";
            statusEl.onclick = () => window.location.reload();
        }
    }

    // Attempt initialization after 500ms to ensure script tags are processed
    setTimeout(initEngine, 500);

    window.currentData = [];
    window.activeIndex = 0;

    window.importKLUv = function() {
        if(!zstdEngine) return alert("Engine not ready. Wait for green status.");
        const raw = document.getElementById('io-box').value.trim();
        try {
            const binary = atob(raw);
            const u8 = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) u8[i] = binary.charCodeAt(i);
            
            const decompressed = zstdEngine.decompressor.decompress(u8);
            const text = new TextDecoder().decode(decompressed);
            window.currentData = JSON.parse(text);
            if (!Array.isArray(window.currentData)) window.currentData = [window.currentData];
            renderSidebar();
            loadContainer(0);
        } catch (e) { alert("Import Error: " + e.message); }
    };

    window.exportKLUv = function() {
        if(!zstdEngine) return alert("Engine not ready.");
        try {
            const json = JSON.stringify(window.currentData);
            const u8 = new TextEncoder().encode(json);
            const compressed = zstdEngine.compressor.compress(u8);
            let bin = "";
            for (let i = 0; i < compressed.length; i++) bin += String.fromCharCode(compressed[i]);
            document.getElementById('io-box').value = btoa(bin);
            alert("Export Complete.");
        } catch (e) { alert("Export Error: " + e.message); }
    };

    window.renderSidebar = function() {
        const list = document.getElementById('container-list');
        list.innerHTML = '';
        window.currentData.forEach((c, i) => {
            const item = document.createElement('div');
            item.style = `background:#222; padding:10px; margin-top:5px; border-radius:5px; cursor:pointer; border:1px solid ${i === window.activeIndex ? '#ffcc33' : '#333'}`;
            item.innerHTML = `<strong>${c.NAME || 'Object'}</strong>`;
            item.onclick = () => loadContainer(i);
            list.appendChild(item);
        });
    };

    window.loadContainer = function(index) {
        window.activeIndex = index;
        renderSidebar();
        const editor = document.getElementById('node-editor');
        editor.innerHTML = '';
        const container = window.currentData[index];
        let nodes = [];
        try {
            const inner = typeof container.DATA === 'string' ? JSON.parse(container.DATA) : container.DATA;
            nodes = inner.Line || container.Line || [];
        } catch(e) { nodes = container.Line || []; }

        nodes.forEach((node, nIdx) => {
            const card = document.createElement('div');
            card.className = 'node-card';
            let props = '';
            Object.keys(node).forEach(k => {
                if (k === 'K_NAME' || k === 'Preview') return;
                props += `<div class="prop-box"><span class="label">${k}</span>
                          <input class="prop-input" value="${node[k]}" onchange="updateVal(${nIdx},'${k}',this.value)"></div>`;
            });
            card.innerHTML = `<div class="node-header"><strong>${node.K_NAME}</strong></div><div class="node-body">${props}</div>`;
            editor.appendChild(card);
        });
    };

    window.updateVal = function(nIdx, k, v) {
        const container = window.currentData[window.activeIndex];
        const val = isNaN(parseFloat(v)) ? v : parseFloat(v);
        if (container.DATA && typeof container.DATA === 'string') {
            let inner = JSON.parse(container.DATA);
            inner.Line[nIdx][k] = val;
            container.DATA = JSON.stringify(inner);
        } else if (container.Line) {
            container.Line[nIdx][k] = val;
        }
    };
</script>
</body>
</html>
