<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JJS STUDIO V1.1.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">
    
    <!-- 1. The Bridge: Defines 'exports' so the library doesn't crash if it acts like Node.js -->
    <script>
        var exports = {}; 
        var module = { exports: exports };
    </script>

    <!-- 2. The Library: Loading the core logic -->
    <script src="https://unpkg.com/fzstd/lib/index.js"></script>

    <style>
        :root { --bg: #0a0a0a; --panel: #141414; --accent: #ffcc33; --text: #ffffff; --border: #333; --node-bg: #1a1a1a; }
        * { font-family: 'Finger Paint', cursive; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--panel); padding: 10px 20px; border-bottom: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.4rem; color: var(--accent); }
        .layout { display: grid; grid-template-columns: 380px 1fr; flex: 1; overflow: hidden; }
        .sidebar { background: var(--panel); border-right: 2px solid var(--border); display: flex; flex-direction: column; padding: 15px; gap: 12px; overflow-y: auto; }
        textarea { width: 100%; height: 140px; background: #000; color: #00ff00; border: 2px solid #333; padding: 12px; font-size: 11px; border-radius: 8px; resize: none; outline: none; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { border: none; padding: 14px; font-size: 0.85rem; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.2s; text-align: center; }
        .import-btn { background: var(--accent); color: #000; }
        .export-btn { background: #28a745; color: #fff; }
        .copy-btn { background: #007bff; color: #fff; grid-column: span 2; }
        .main-view { overflow-y: auto; padding: 25px; background: #0c0c0c; }
        .node-card { background: var(--node-bg); border: 2px solid var(--border); border-radius: 12px; margin-bottom: 25px; }
        .node-header { background: #252525; padding: 10px 15px; border-radius: 10px 10px 0 0; border-bottom: 2px solid var(--border); }
        .node-body { padding: 20px; display: flex; flex-wrap: wrap; gap: 12px; }
        .prop-box { background: #222; border: 1px solid #333; padding: 10px; border-radius: 8px; flex: 1 1 160px; }
        .label { color: var(--accent); font-size: 0.65rem; display: block; opacity: 0.8; margin-bottom: 5px; }
        .prop-input { background: transparent; border: none; border-bottom: 2px solid #444; color: #fff; width: 100%; font-size: 0.9rem; outline: none; }
        #debug-console { position: fixed; bottom: 20px; right: 20px; width: 450px; height: 300px; background: rgba(0,0,0,0.95); border: 2px solid var(--accent); border-radius: 10px; z-index: 9999; display: none; flex-direction: column; }
        #debug-body { flex: 1; padding: 15px; font-family: monospace; font-size: 11px; overflow-y: auto; color: #00ff00; }
        .container-item { background: #222; padding: 12px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; margin-bottom: 5px; }
        .container-item.active { border-color: var(--accent); background: #2a2a2a; }
    </style>
</head>
<body>

<header>
    <div class="logo">JJS STUDIO V1.1.2</div>
    <div id="engine-status" style="font-size: 0.75rem; color: #ffcc33;">SCANNING...</div>
</header>

<div class="layout">
    <div class="sidebar">
        <textarea id="io-box" placeholder="Paste KLUv code here..."></textarea>
        <div class="btn-group">
            <button class="btn import-btn" onclick="importKLUv()">1. IMPORT</button>
            <button class="btn export-btn" onclick="exportKLUv()">2. EXPORT</button>
            <button class="btn copy-btn" onclick="copyResult()">3. COPY CLIPBOARD</button>
        </div>
        <div id="container-list" style="margin-top: 10px;"></div>
    </div>
    <div class="main-view" id="node-editor"></div>
</div>

<div id="debug-console">
    <div style="background:var(--accent); color:#000; padding:8px; font-size:11px; font-weight:bold;">CONSOLE</div>
    <div id="debug-body"></div>
</div>

<script>
    const log = (m) => {
        const b = document.getElementById('debug-body');
        if(b) { b.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${m}</div>`; b.scrollTop = b.scrollHeight; }
    };

    // 3. The Anchor: Manually pulling the engine out of the bridge
    window.fzstd = window.fzstd || exports;

    window.currentData = [];
    window.activeIndex = 0;

    window.onload = () => {
        const statusEl = document.getElementById('engine-status');
        
        if(window.fzstd && window.fzstd.decompress) {
            statusEl.innerText = "ENGINE: BROWSER NATIVE";
            statusEl.style.color = "#28a745";
            log("Engine hooked via Bridge successfully.");
        } else {
            statusEl.innerText = "ENGINE: ERROR";
            statusEl.style.color = "#ff4444";
            log("Critical: Bridge failed to capture fzstd.");
        }
    };

    window.importKLUv = function() {
        let raw = document.getElementById('io-box').value.trim();
        try {
            const binary = atob(raw);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            
            log("Attempting Decompression...");
            const decompressed = window.fzstd.decompress(bytes);
            const text = new TextDecoder().decode(decompressed);
            
            window.currentData = JSON.parse(text);
            if (!Array.isArray(window.currentData)) window.currentData = [window.currentData];
            
            renderSidebar();
            loadContainer(0);
            log("Import Successful.");
        } catch (e) {
            log("Import Error: " + e.message);
        }
    };

    window.exportKLUv = function() {
        try {
            const jsonStr = JSON.stringify(window.currentData);
            const uint8 = new TextEncoder().encode(jsonStr);
            const compressed = window.fzstd.compress(uint8);
            let bin = "";
            for (let i = 0; i < compressed.length; i++) bin += String.fromCharCode(compressed[i]);
            document.getElementById('io-box').value = btoa(bin);
            log("Export Successful.");
        } catch (e) { log("Export Error: " + e.message); }
    };

    window.renderSidebar = function() {
        const list = document.getElementById('container-list');
        list.innerHTML = '';
        window.currentData.forEach((c, i) => {
            const item = document.createElement('div');
            item.className = `container-item ${i === window.activeIndex ? 'active' : ''}`;
            item.innerHTML = `<strong>${c.NAME || 'Object'}</strong>`;
            item.onclick = () => loadContainer(i);
            list.appendChild(item);
        });
    };

    window.loadContainer = function(index) {
        window.activeIndex = index;
        renderSidebar();
        const editor = document.getElementById('node-editor');
        editor.innerHTML = '';
        const container = window.currentData[index];
        
        let nodes = [];
        try {
            const inner = typeof container.DATA === 'string' ? JSON.parse(container.DATA) : container.DATA;
            nodes = inner.Line || container.Line || [];
        } catch(e) { nodes = container.Line || []; }

        nodes.forEach((node, nIdx) => {
            const card = document.createElement('div');
            card.className = 'node-card';
            let props = '';
            Object.keys(node).forEach(k => {
                if (k === 'K_NAME' || k === 'Preview') return;
                props += `<div class="prop-box"><span class="label">${k}</span>
                          <input class="prop-input" value="${node[k]}" onchange="updateVal(${nIdx},'${k}',this.value)"></div>`;
            });
            card.innerHTML = `<div class="node-header"><strong>${node.K_NAME}</strong></div><div class="node-body">${props}</div>`;
            editor.appendChild(card);
        });
    };

    window.updateVal = function(nIdx, k, v) {
        const container = window.currentData[window.activeIndex];
        const val = isNaN(parseFloat(v)) ? v : v;
        if (container.DATA && typeof container.DATA === 'string') {
            let inner = JSON.parse(container.DATA);
            inner.Line[nIdx][k] = val;
            container.DATA = JSON.stringify(inner);
        } else if (container.Line) {
            container.Line[nIdx][k] = val;
        }
    };

    window.copyResult = function() {
        document.getElementById('io-box').select();
        document.execCommand('copy');
        alert("Copied!");
    };

    window.addEventListener('keydown', (e) => { 
        if(e.key === 'F2') { 
            const c = document.getElementById('debug-console');
            c.style.display = c.style.display === 'flex' ? 'none' : 'flex';
        }
    });
</script>
</body>
</html>
