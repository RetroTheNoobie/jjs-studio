<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JJS STUDIO V1.5.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --panel: #0f0f0f; --accent: #ffcc33; --text: #e0e0e0; --border: #222; }
        * { font-family: 'Finger Paint', cursive; box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Layout */
        .sidebar { width: 360px; background: var(--panel); border-right: 2px solid var(--border); display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        .main { flex: 1; overflow-y: auto; padding: 40px; background: radial-gradient(circle at top left, #111, #050505); }
        
        /* IO Controls */
        .io-area { padding: 25px; border-bottom: 1px solid var(--border); background: #0a0a0a; }
        textarea { width: 100%; height: 90px; background: #000; color: #2ecc71; border: 1px solid #333; border-radius: 12px; font-size: 11px; padding: 12px; resize: none; margin-bottom: 15px; border-left: 3px solid #2ecc71; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 8px; text-transform: uppercase; transition: 0.3s ease; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.2); }
        
        /* Sidebar List */
        .list { flex: 1; overflow-y: auto; padding: 15px; scrollbar-width: thin; scrollbar-color: var(--accent) #111; }
        .item { padding: 16px; background: #111; margin-bottom: 12px; border-radius: 14px; cursor: pointer; border-left: 6px solid transparent; transition: 0.2s; position: relative; }
        .item:hover { background: #181818; }
        .item.active { border-left-color: var(--accent); background: #1f1f1f; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .item .name { display: block; font-size: 1.1rem; color: #fff; }
        .item .kname { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        /* Property Editor */
        .prop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .prop-card { background: #141414; padding: 15px; border-radius: 12px; border: 1px solid #222; transition: 0.2s; }
        .prop-card:focus-within { border-color: var(--accent); background: #1a1a1a; }
        .prop-card label { display: block; font-size: 0.65rem; color: #666; margin-bottom: 6px; text-transform: uppercase; font-weight: bold; }
        .prop-card input { width: 100%; background: transparent; border: none; border-bottom: 2px solid #333; color: #fff; font-size: 1rem; padding: 4px 0; }
        .prop-card input:focus { border-bottom-color: var(--accent); }
        
        #status-bar { position: fixed; bottom: 0; right: 0; padding: 5px 15px; font-size: 0.6rem; color: #444; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="io-area">
        <div style="font-size: 1.4rem; color: var(--accent); margin-bottom: 15px; text-align: center;">JJS STUDIO</div>
        <textarea id="io-box" placeholder="PASTE KLUV STRING..."></textarea>
        <button class="btn" style="background: var(--accent); color: #000;" onclick="importKluv()">Import Character</button>
        <button class="btn" style="background: #2ecc71; color: #fff;" onclick="exportKluv()">Export KLUv</button>
    </div>
    <div class="list" id="sidebar-list"></div>
</div>

<div class="main">
    <div id="editor-header" style="margin-bottom: 40px; border-left: 5px solid var(--accent); padding-left: 20px;">
        <h1 style="margin:0; opacity:0.1;">UPLOAD DATA TO START</h1>
    </div>
    <div class="prop-grid" id="editor-grid"></div>
</div>

<div id="status-bar">ENGINE 2026.4 // READY</div>

<script src="./zstd-bundle.js"></script>
<script>
    let moveData = [];
    let activeIdx = 0;
    let zstd = null;

    // Initialize Zstd Engine
    async function init() {
        const engine = window.ZstdWeb || window.zstd || window.Zstd;
        if (engine?.init) { 
            await engine.init(); 
            zstd = engine;
            document.getElementById('status-bar').innerText = "ENGINE 2026.4 // CONNECTED";
            document.getElementById('status-bar').style.color = "#2ecc71";
        }
    }

    function importKluv() {
        try {
            const raw = document.getElementById('io-box').value.trim();
            if(!raw) return;
            const bin = Uint8Array.from(atob(raw), c => c.charCodeAt(0));
            const decoded = new TextDecoder().decode(zstd.decompress(bin));
            moveData = JSON.parse(decoded);
            renderSidebar();
            loadMove(0);
        } catch(e) {
            alert("ERROR: Invalid KLUv string or decompression failed.");
        }
    }

    function renderSidebar() {
        const list = document.getElementById('sidebar-list');
        list.innerHTML = moveData.map((m, i) => `
            <div class="item ${i === activeIdx ? 'active' : ''}" onclick="loadMove(${i})">
                <span class="kname">${m.K_NAME || "GENERIC"}</span>
                <span class="name">${m.NAME || "Unnamed Move"}</span>
            </div>
        `).join('');
    }

    function loadMove(index) {
        activeIdx = index;
        renderSidebar();
        const move = moveData[index];
        
        document.getElementById('editor-header').innerHTML = `
            <div style="font-size: 0.8rem; color: var(--accent);">${move.K_NAME}</div>
            <h1 style="margin: 0; font-size: 2.2rem; color: #fff;">${move.NAME || 'Unnamed'}</h1>
        `;

        const grid = document.getElementById('editor-grid');
        grid.innerHTML = Object.keys(move).map(key => `
            <div class="prop-card">
                <label>${key}</label>
                <input type="text" value="${move[key]}" onchange="updateVal('${key}', this.value)">
            </div>
        `).join('');
    }

    function updateVal(key, val) {
        // Smart type conversion: Logic for Booleans, Numbers, and Strings
        let finalVal;
        const lowVal = val.toLowerCase();
        if (lowVal === "true") finalVal = true;
        else if (lowVal === "false") finalVal = false;
        else if (val === "" || isNaN(val)) finalVal = val;
        else finalVal = parseFloat(val);

        moveData[activeIdx][key] = finalVal;
    }

    function exportKluv() {
        if (!moveData.length) return;
        const jsonStr = JSON.stringify(moveData);
        const compressed = zstd.compress(new TextEncoder().encode(jsonStr), 3);
        let binary = "";
        for (let i = 0; i < compressed.length; i++) binary += String.fromCharCode(compressed[i]);
        document.getElementById('io-box').value = btoa(binary);
        
        // Visual feedback
        const btn = document.querySelector('.export-btn');
        const oldText = "Export KLUv";
    }

    // Startup
    setTimeout(init, 300);
</script>
</body>
</html>
