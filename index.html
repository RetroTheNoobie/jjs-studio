<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JJS STUDIO V1.3.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050505; 
            --panel: #0f0f0f; 
            --accent: #ffcc33; 
            --accent-glow: rgba(255, 204, 51, 0.3);
            --text: #e0e0e0; 
            --border: #222; 
            --node-bg: #141414; 
            --success: #2ecc71;
        }

        * { font-family: 'Finger Paint', cursive; box-sizing: border-box; transition: all 0.2s ease; }
        
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header Upgrade */
        header { 
            background: var(--panel); 
            padding: 15px 25px; 
            border-bottom: 3px solid var(--accent); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .layout { display: grid; grid-template-columns: 400px 1fr; flex: 1; overflow: hidden; }
        
        /* Sidebar Polish */
        .sidebar { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; box-shadow: 5px 0 15px rgba(0,0,0,0.3); }
        .sidebar-controls { padding: 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: #0a0a0a; }
        .container-list { flex: 1; overflow-y: auto; padding: 15px; scrollbar-width: thin; scrollbar-color: var(--accent) transparent; }

        textarea { 
            width: 100%; height: 130px; background: #000; color: var(--success); 
            border: 2px solid var(--border); padding: 12px; font-size: 11px; 
            border-radius: 12px; resize: none; outline: none; margin-bottom: 15px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
        }
        textarea:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        
        /* Buttons */
        .btn { 
            border: none; padding: 14px; font-size: 0.9rem; cursor: pointer; 
            border-radius: 10px; font-weight: bold; width: 100%; margin-bottom: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .import-btn { background: var(--accent); color: #000; box-shadow: 0 4px 0 #b38f1d; }
        .import-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b38f1d; }
        
        .export-btn { background: var(--success); color: #fff; box-shadow: 0 4px 0 #219150; }
        .export-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #219150; }
        
        /* Main Workspace */
        .main-view { overflow-y: auto; padding: 40px; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        
        /* Node Cards Restoration */
        .node-card { 
            background: var(--node-bg); border: 1px solid var(--border); 
            border-radius: 16px; margin-bottom: 30px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .node-header { 
            background: linear-gradient(90deg, #1f1f1f, #141414); 
            padding: 15px 20px; border-bottom: 2px solid var(--accent); 
            color: var(--accent); display: flex; justify-content: space-between;
        }
        .node-body { padding: 25px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        
        /* Property Inputs */
        .prop-box { 
            background: #1a1a1a; border: 1px solid #333; padding: 12px; 
            border-radius: 10px; position: relative;
        }
        .prop-box:hover { border-color: var(--accent); background: #222; }
        .label { color: #888; font-size: 0.7rem; display: block; margin-bottom: 5px; }
        .prop-input { 
            background: transparent; border: none; border-bottom: 1px solid #444; 
            color: #fff; width: 100%; font-size: 1rem; outline: none; 
        }
        .prop-input:focus { border-color: var(--accent); }
        
        /* Floating Console */
        #terminal { 
            position: fixed; bottom: 20px; left: 20px; right: 20px; height: 180px; 
            background: rgba(0,0,0,0.95); border: 2px solid var(--accent); 
            border-radius: 15px; color: var(--success); font-family: monospace; 
            font-size: 13px; padding: 20px; overflow-y: auto; display: none; 
            z-index: 1000; box-shadow: 0 0 40px rgba(0,0,0,1);
            backdrop-filter: blur(10px);
        }

        /* Container List Items */
        .container-item { 
            background: #111; padding: 15px; border-radius: 12px; cursor: pointer; 
            border-left: 5px solid transparent; margin-bottom: 10px; transition: 0.3s;
        }
        .container-item:hover { background: #1a1a1a; transform: translateX(5px); }
        .container-item.active { 
            border-left-color: var(--accent); background: #222; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .container-item strong { display: block; font-size: 0.9rem; }
        .container-item span { font-size: 0.7rem; color: #666; }
    </style>
</head>
<body>

<header>
    <div>
        <span style="font-size: 1.6rem; color: var(--accent); text-shadow: 0 0 10px var(--accent-glow);">JJS STUDIO</span>
        <span style="margin-left: 10px; font-size: 0.8rem; color: #666;">V1.3.1</span>
    </div>
    <div style="text-align: right;">
        <div id="status" style="font-size: 0.8rem; letter-spacing: 1px;">SYSTEM: OFFLINE</div>
        <div style="font-size: 0.6rem; opacity: 0.4;">[F2] CONSOLE</div>
    </div>
</header>

<div class="layout">
    <div class="sidebar">
        <div class="sidebar-controls">
            <textarea id="io-box" placeholder="PASTE RAW STRING HERE..."></textarea>
            <button class="btn import-btn" id="import-trigger">Load Data</button>
            <button class="btn export-btn" id="export-trigger">Generate String</button>
        </div>
        <div class="container-list" id="container-list">
            <!-- Items injected here -->
        </div>
    </div>
    <div class="main-view" id="node-editor">
        <div style="text-align: center; margin-top: 150px; opacity: 0.2;">
            <h1 style="font-size: 3rem;">STUDIO IDLE</h1>
            <p>Import a KLUv string to begin editing</p>
        </div>
    </div>
</div>

<div id="terminal">> System Initialized... Ready for Handshake.</div>

<script src="./zstd-bundle.js"></script>

<script>
    const term = document.getElementById('terminal');
    const log = (m) => { 
        const time = new Date().toLocaleTimeString().split(' ')[0];
        term.innerHTML += `<div style="margin-bottom:4px"><span style="color:#666">[${time}]</span> ${m}</div>`; 
        term.scrollTop = term.scrollHeight; 
    };
    const status = document.getElementById('status');

    window.currentData = [];
    window.activeIndex = 0;
    window.zstd = null;

    window.addEventListener('keydown', (e) => {
        if (e.key === 'F2') {
            e.preventDefault();
            term.style.display = term.style.display === 'none' ? 'block' : 'none';
        }
    });

    async function init() {
        const engine = window.ZstdWeb || window.zstd || window.Zstd || window.module;
        if (engine && engine.init) {
            try {
                await engine.init();
                window.zstd = engine;
                status.innerText = 'SYSTEM: ONLINE';
                status.style.color = '#2ecc71';
                log('WASM Handshake Successful.');
            } catch(e) { log('WASM Error: ' + e.message); }
        }
    }

    document.getElementById('import-trigger').onclick = async () => {
        const raw = document.getElementById('io-box').value.trim();
        if (!raw || !window.zstd) return log('Error: Missing data or engine.');
        try {
            log('Decompressing payload...');
            const u8 = Uint8Array.from(atob(raw), c => c.charCodeAt(0));
            const decompressed = window.zstd.decompress(u8);
            const text = new TextDecoder().decode(decompressed);
            
            window.currentData = JSON.parse(text);
            if (!Array.isArray(window.currentData)) window.currentData = [window.currentData];
            
            log(`Success. ${window.currentData.length} containers loaded.`);
            renderSidebar();
            loadContainer(0);
        } catch(e) { log('Import Failed: Check string validity.'); }
    };

    document.getElementById('export-trigger').onclick = () => {
        if (!window.zstd) return;
        try {
            log('Compressing modifications...');
            const json = JSON.stringify(window.currentData);
            const u8 = new TextEncoder().encode(json);
            const compressed = window.zstd.compress(u8, 3);
            let bin = '';
            for (let i = 0; i < compressed.length; i++) bin += String.fromCharCode(compressed[i]);
            document.getElementById('io-box').value = btoa(bin);
            log('Export complete. String copied to text box.');
        } catch(e) { log('Export Error: ' + e.message); }
    };

    function renderSidebar() {
        const list = document.getElementById('container-list');
        list.innerHTML = '';
        window.currentData.forEach((c, i) => {
            const item = document.createElement('div');
            item.className = `container-item ${i === window.activeIndex ? 'active' : ''}`;
            
            let innerData = {};
            try { innerData = typeof c.DATA === 'string' ? JSON.parse(c.DATA) : (c.DATA || {}); } catch(e){}
            
            // Fixed Naming Logic
            let label = c.NAME || (innerData.Line && innerData.Line[0] ? innerData.Line[0].K_NAME : null) || "Object " + i;
            let typeLabel = innerData.Line ? innerData.Line.length + " Nodes" : "Data Object";
            
            item.innerHTML = `<strong>${label}</strong><span>${typeLabel}</span>`;
            item.onclick = () => loadContainer(i);
            list.appendChild(item);
        });
    }

    function loadContainer(index) {
        window.activeIndex = index;
        renderSidebar();
        const editor = document.getElementById('node-editor');
        editor.innerHTML = '';
        const container = window.currentData[index];
        
        let nodes = [];
        try {
            const inner = typeof container.DATA === 'string' ? JSON.parse(container.DATA) : container.DATA;
            nodes = (inner && inner.Line) ? inner.Line : (container.Line || []);
        } catch(e) { nodes = container.Line || []; }

        nodes.forEach((node, nIdx) => {
            const card = document.createElement('div');
            card.className = 'node-card';
            
            let props = '';
            Object.keys(node).forEach(k => {
                if (k === 'K_NAME' || k === 'Preview') return;
                props += `<div class="prop-box">
                            <span class="label">${k}</span>
                            <input class="prop-input" value="${node[k]}" data-node="${nIdx}" data-key="${k}">
                          </div>`;
            });

            card.innerHTML = `<div class="node-header">
                                <strong>${node.K_NAME || 'NODE'}</strong>
                                <span style="font-size:0.6rem;opacity:0.5">#${nIdx}</span>
                              </div>
                              <div class="node-body">${props}</div>`;
            editor.appendChild(card);
        });

        editor.querySelectorAll('.prop-input').forEach(input => {
            input.onchange = (e) => {
                updateVal(e.target.getAttribute('data-node'), e.target.getAttribute('data-key'), e.target.value);
            };
        });
    }

    function updateVal(nIdx, k, v) {
        const container = window.currentData[window.activeIndex];
        const val = isNaN(parseFloat(v)) ? v : parseFloat(v);
        
        if (container.DATA && typeof container.DATA === 'string') {
            let inner = JSON.parse(container.DATA);
            inner.Line[nIdx][k] = val;
            container.DATA = JSON.stringify(inner);
        } else if (container.Line) {
            container.Line[nIdx][k] = val;
        } else if (container.DATA && container.DATA.Line) {
            container.DATA.Line[nIdx][k] = val;
        }
        log(`Modified: ${k} → ${val}`);
    }

    setTimeout(init, 500);
</script>
</body>
</html>
