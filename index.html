<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJS TOOLBOX - MAIN MENU</title>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a1a;
            --thickness: 4px;
            --accent: #ffcc33;
            --btn-bg: #252525;
            --btn-hover: #333;
            --wip-red: #ff4444;
        }

        /* Global Reset to maintain the chunky engine look */
        * { 
            box-sizing: border-box; 
            font-family: 'Finger Paint', cursive; 
            border-radius: 0 !important; 
        }

        body { 
            margin: 0; 
            background: var(--bg); 
            color: #fff; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Menu Container */
        .menu-container {
            width: 90%;
            max-width: 550px;
            background: #111;
            border: var(--thickness) solid #000;
            padding: 40px;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.8);
        }

        .header {
            text-align: center;
            border-bottom: var(--thickness) solid #000;
            margin-bottom: 30px;
            padding-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 2.8rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .tool-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Tool Buttons - Stretched and Flat */
        .tool-btn {
            background: var(--btn-bg);
            border: var(--thickness) solid #000;
            padding: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            text-decoration: none; /* Remove link underline */
            transition: 0.1s;
            position: relative;
        }

        .tool-btn:hover {
            background: var(--btn-hover);
            transform: translate(-3px, -3px);
            box-shadow: 8px 8px 0px #000;
        }

        .tool-btn:active {
            transform: translate(0, 0);
            box-shadow: 0px 0px 0px #000;
        }

        .tool-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
        }

        .tool-desc {
            font-size: 0.8rem;
            color: #888;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* WIP Badge Styling */
        .wip-tag {
            position: absolute;
            top: -12px;
            right: 15px;
            background: var(--wip-red);
            color: #000;
            font-size: 0.7rem;
            padding: 2px 10px;
            border: var(--thickness) solid #000;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <div class="header">
            <h1>JJS TOOLS</h1>
        </div>

        <div class="tool-list">
            
            <!-- LINK TO JJS STUDIO -->
            <a href="studio.html" class="tool-btn">
                <div class="wip-tag">W.I.P</div>
                <span class="tool-name">JJS STUDIO</span>
                <span class="tool-desc">Move & Data Editor (Highly Work in Progress)</span>
            </a>

            <!-- LINK TO CHOPPIFY -->
            <a href="choppify.html" class="tool-btn">
                <span class="tool-name">ANIM FRAME REMOVER</span>
                <span class="tool-desc">"CHOPPIFY" - Optimize animation frame rates</span>
            </a>

            <!-- PLACEHOLDER FOR FUTURE TOOLS -->
            <div class="tool-btn" style="opacity: 0.3; cursor: not-allowed;">
                <span class="tool-name">???</span>
                <span class="tool-desc">More tools coming soon...</span>
            </div>

        </div>
    </div>

    <!-- Background text for vibe -->
    <div style="position:fixed; bottom:10px; right:15px; font-size:0.8rem; color:#444; pointer-events:none;">
        BUILD V1.0.0
    </div>

</body>
</html>
