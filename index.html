<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JJS STUDIO V1.3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --panel: #141414; --accent: #ffcc33; --text: #ffffff; --border: #333; --node-bg: #1a1a1a; }
        * { font-family: 'Finger Paint', cursive; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: var(--panel); padding: 10px 20px; border-bottom: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        
        .layout { display: grid; grid-template-columns: 380px 1fr; flex: 1; overflow: hidden; }
        
        /* Sidebar with internal scrolling */
        .sidebar { background: var(--panel); border-right: 2px solid var(--border); display: flex; flex-direction: column; height: 100%; }
        .sidebar-controls { padding: 15px; border-bottom: 2px solid var(--border); flex-shrink: 0; }
        .container-list { flex: 1; overflow-y: auto; padding: 15px; }

        textarea { width: 100%; height: 120px; background: #000; color: #00ff00; border: 2px solid #333; padding: 12px; font-size: 11px; border-radius: 8px; resize: none; outline: none; margin-bottom: 10px; }
        
        .btn { border: none; padding: 12px; font-size: 0.85rem; cursor: pointer; border-radius: 8px; font-weight: bold; width: 100%; margin-bottom: 8px; }
        .import-btn { background: var(--accent); color: #000; }
        .export-btn { background: #28a745; color: #fff; }
        
        /* Main view scrolling */
        .main-view { overflow-y: auto; padding: 25px; background: #0c0c0c; }
        
        .node-card { background: var(--node-bg); border: 2px solid var(--border); border-radius: 12px; margin-bottom: 25px; overflow: hidden; }
        .node-header { background: #252525; padding: 10px 15px; border-bottom: 2px solid var(--border); color: var(--accent); }
        .node-body { padding: 20px; display: flex; flex-wrap: wrap; gap: 12px; }
        
        .prop-box { background: #222; border: 1px solid #333; padding: 10px; border-radius: 8px; flex: 1 1 160px; }
        .label { color: var(--accent); font-size: 0.65rem; display: block; opacity: 0.8; }
        .prop-input { background: transparent; border: none; border-bottom: 2px solid #444; color: #fff; width: 100%; font-size: 0.9rem; outline: none; }
        
        /* Floating Console (F2) */
        #terminal { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 200px; 
            background: rgba(0,0,0,0.9); border-top: 4px solid var(--accent); 
            color: #00ff00; font-family: monospace; font-size: 12px; padding: 15px; 
            overflow-y: auto; display: none; z-index: 1000; 
        }

        .container-item { background: #222; padding: 12px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; margin-bottom: 8px; transition: 0.2s; }
        .container-item:hover { background: #282828; }
        .container-item.active { border-color: var(--accent); background: #2a2a2a; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 1.4rem; color: var(--accent);">JJS STUDIO V1.3.0</div>
    <div style="font-size: 0.7rem; opacity: 0.6;">PRESS F2 FOR CONSOLE</div>
    <div id="status">WASM: INITIALIZING...</div>
</header>

<div class="layout">
    <div class="sidebar">
        <div class="sidebar-controls">
            <textarea id="io-box" placeholder="PASTE KLUv HERE"></textarea>
            <button class="btn import-btn" id="import-trigger">IMPORT</button>
            <button class="btn export-btn" id="export-trigger">EXPORT</button>
        </div>
        <div class="container-list" id="container-list"></div>
    </div>
    <div class="main-view" id="node-editor">
        <h2 style="color: #444; text-align: center; margin-top: 100px;">Import code to begin</h2>
    </div>
</div>

<div id="terminal">> Console Ready. Press F2 to hide/show.<br></div>

<script src="./zstd-bundle.js"></script>

<script>
    const term = document.getElementById('terminal');
    const log = (m) => { term.innerHTML += `> ${m}<br>`; term.scrollTop = term.scrollHeight; };
    const status = document.getElementById('status');

    window.currentData = [];
    window.activeIndex = 0;
    window.zstd = null;

    // F2 Toggle Logic
    window.addEventListener('keydown', (e) => {
        if (e.key === 'F2') {
            e.preventDefault();
            term.style.display = term.style.display === 'none' ? 'block' : 'none';
        }
    });

    async function init() {
        const engine = window.ZstdWeb || window.zstd || window.Zstd || window.module;
        if (engine && engine.init) {
            try {
                await engine.init();
                window.zstd = engine;
                status.innerText = 'ENGINE: ONLINE';
                status.style.color = '#28a745';
                log('Zstd WASM Engine Handshake Success.');
            } catch(e) { log('WASM Init Error: ' + e.message); }
        }
    }

    document.getElementById('import-trigger').onclick = async () => {
        const raw = document.getElementById('io-box').value.trim();
        if (!raw || !window.zstd) return log('Error: System not ready.');
        try {
            log('Decompressing...');
            const u8 = Uint8Array.from(atob(raw), c => c.charCodeAt(0));
            const decompressed = window.zstd.decompress(u8);
            const text = new TextDecoder().decode(decompressed);
            
            window.currentData = JSON.parse(text);
            if (!Array.isArray(window.currentData)) window.currentData = [window.currentData];
            
            log('Import Success. Found ' + window.currentData.length + ' containers.');
            renderSidebar();
            loadContainer(0);
        } catch(e) { log('Import Error: ' + e.message); }
    };

    document.getElementById('export-trigger').onclick = () => {
        if (!window.zstd) return log('Error: Engine offline.');
        try {
            log('Compressing...');
            const json = JSON.stringify(window.currentData);
            const u8 = new TextEncoder().encode(json);
            const compressed = window.zstd.compress(u8, 3);
            let bin = '';
            for (let i = 0; i < compressed.length; i++) bin += String.fromCharCode(compressed[i]);
            document.getElementById('io-box').value = btoa(bin);
            log('EXPORT SUCCESSFUL.');
        } catch(e) { log('Export Error: ' + e.message); }
    };

    function renderSidebar() {
        const list = document.getElementById('container-list');
        list.innerHTML = '';
        window.currentData.forEach((c, i) => {
            const item = document.createElement('div');
            item.className = `container-item ${i === window.activeIndex ? 'active' : ''}`;
            
            // Fix: Logic to identify container by name or its content type
            let innerData = {};
            try { innerData = typeof c.DATA === 'string' ? JSON.parse(c.DATA) : (c.DATA || {}); } catch(e){}
            
            let displayName = c.NAME || (innerData.Line && innerData.Line[0] ? innerData.Line[0].K_NAME : null) || "Container " + i;
            
            item.innerHTML = `<strong>${displayName}</strong>`;
            item.onclick = () => loadContainer(i);
            list.appendChild(item);
        });
    }

    function loadContainer(index) {
        window.activeIndex = index;
        renderSidebar();
        const editor = document.getElementById('node-editor');
        editor.innerHTML = '';
        const container = window.currentData[index];
        
        let nodes = [];
        try {
            const inner = typeof container.DATA === 'string' ? JSON.parse(container.DATA) : container.DATA;
            nodes = (inner && inner.Line) ? inner.Line : (container.Line || []);
        } catch(e) { nodes = container.Line || []; }

        nodes.forEach((node, nIdx) => {
            const card = document.createElement('div');
            card.className = 'node-card';
            
            let props = '';
            Object.keys(node).forEach(k => {
                if (k === 'K_NAME' || k === 'Preview') return;
                props += `<div class="prop-box">
                            <span class="label">${k}</span>
                            <input class="prop-input" value="${node[k]}" data-node="${nIdx}" data-key="${k}">
                          </div>`;
            });

            card.innerHTML = `<div class="node-header"><strong>${node.K_NAME || 'Node'}</strong></div>
                              <div class="node-body">${props}</div>`;
            editor.appendChild(card);
        });

        editor.querySelectorAll('.prop-input').forEach(input => {
            input.onchange = (e) => {
                updateVal(e.target.getAttribute('data-node'), e.target.getAttribute('data-key'), e.target.value);
            };
        });
    }

    function updateVal(nIdx, k, v) {
        const container = window.currentData[window.activeIndex];
        const val = isNaN(parseFloat(v)) ? v : parseFloat(v);
        
        if (container.DATA && typeof container.DATA === 'string') {
            let inner = JSON.parse(container.DATA);
            inner.Line[nIdx][k] = val;
            container.DATA = JSON.stringify(inner);
        } else if (container.Line) {
            container.Line[nIdx][k] = val;
        } else if (container.DATA && container.DATA.Line) {
            container.DATA.Line[nIdx][k] = val;
        }
        log(`Field [${k}] updated.`);
    }

    setTimeout(init, 500);
</script>
</body>
</html>
