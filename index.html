<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JJS STUDIO V1.2.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --panel: #141414; --accent: #ffcc33; --text: #ffffff; --border: #333; }
        * { font-family: 'Finger Paint', cursive; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--panel); padding: 10px 20px; border-bottom: 4px solid var(--accent); display: flex; justify-content: space-between; }
        .layout { display: grid; grid-template-columns: 350px 1fr; flex: 1; overflow: hidden; }
        .sidebar { background: var(--panel); border-right: 2px solid var(--border); padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        textarea { width: 100%; height: 120px; background: #000; color: #00ff00; border: 2px solid #444; padding: 10px; font-size: 10px; border-radius: 5px; }
        .btn { border: none; padding: 12px; cursor: pointer; border-radius: 5px; font-weight: bold; width: 100%; }
        .import-btn { background: var(--accent); color: #000; }
        .export-btn { background: #28a745; color: #fff; }
        .main-view { padding: 20px; background: #0c0c0c; overflow-y: auto; }
        .node-card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; margin-bottom: 15px; padding: 15px; }
        .prop-input { background: #222; border: 1px solid #444; color: #fff; width: 100%; padding: 5px; margin-top: 5px; border-radius: 4px; outline: none; }
        #terminal { height: 120px; background: #000; border-top: 2px solid var(--accent); color: #00ff00; font-family: monospace; font-size: 11px; padding: 10px; overflow-y: auto; }
    </style>
</head>
<body>

<header>
    <div style="color: var(--accent);">JJS STUDIO V1.2.5</div>
    <div id="status">ENGINE: LOADING...</div>
</header>

<div class="layout">
    <div class="sidebar">
        <textarea id="io-box" placeholder="PASTE KLUv HERE"></textarea>
        <button class="btn import-btn" id="import-trigger">IMPORT</button>
        <button class="btn export-btn" id="export-trigger">EXPORT</button>
        <div id="container-list"></div>
    </div>
    <div class="main-view" id="node-editor"></div>
</div>

<div id="terminal">> Awaiting Module Engine...<br></div>

<!-- Load the self-hosted zstd bundle as a module script.
     zstd-bundle.js is an IIFE that exposes ZstdWeb globally,
     and fetches zstd/zstd.wasm relatively. -->
<script type="module">
    const term = document.getElementById('terminal');
    const log = (m) => { term.innerHTML += `> ${m}<br>`; term.scrollTop = term.scrollHeight; };
    const status = document.getElementById('status');

    window.currentData = [];
    window.activeIndex = 0;
    window.zstd = null;

    async function init() {
        try {
            log('Loading self-hosted zstd bundle...');

            // Load the bundle as a module - it exposes init, compress, decompress
            const zstdMod = await import('./zstd-bundle.js');

            // init() triggers the WASM fetch of ./zstd/zstd.wasm
            await zstdMod.init();

            window.zstd = {
                compress: zstdMod.compress,
                decompress: zstdMod.decompress
            };

            status.innerText = 'ENGINE: ONLINE';
            status.style.color = '#28a745';
            log('zstd bundle loaded. Compress + Decompress ready.');
        } catch(e) {
            log('zstd bundle failed: ' + e.message);
            log('Trying fzstd fallback (decompress only)...');
            try {
                const mod = await import('https://cdn.skypack.dev/fzstd@0.1.0');
                window.zstd = {
                    decompress: mod.decompress,
                    compress: () => { throw new Error('Compress not available in fallback mode.'); }
                };
                status.innerText = 'ENGINE: PARTIAL';
                status.style.color = '#ffaa00';
                log('fzstd fallback active. Import works, Export disabled.');
            } catch(e2) {
                log('All engines failed: ' + e2.message);
                status.innerText = 'ENGINE: OFFLINE';
                status.style.color = '#ff4444';
            }
        }
    }

    // --- IMPORT ---
    document.getElementById('import-trigger').onclick = async () => {
        const raw = document.getElementById('io-box').value.trim();
        if (!raw) return log('Error: Box is empty.');
        if (!window.zstd) return log('Error: Engine not loaded.');
        try {
            log('Decoding Base64...');
            const binary = atob(raw);
            const u8 = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) u8[i] = binary.charCodeAt(i);

            log('Decompressing Zstd (' + u8.length + ' bytes)...');
            const decompressed = window.zstd.decompress(u8);
            const text = new TextDecoder().decode(decompressed);

            log('Parsing JSON (' + text.length + ' chars)...');
            window.currentData = JSON.parse(text);
            if (!Array.isArray(window.currentData)) window.currentData = [window.currentData];

            renderSidebar();
            loadContainer(0);
            log('Success: ' + window.currentData.length + ' container(s) loaded.');
        } catch(e) {
            log('Import Error: ' + e.message);
        }
    };

    // --- EXPORT ---
    document.getElementById('export-trigger').onclick = () => {
        if (!window.zstd) return log('Error: Engine not loaded.');
        try {
            log('Compressing Data...');
            const json = JSON.stringify(window.currentData);
            const u8 = new TextEncoder().encode(json);
            const compressed = window.zstd.compress(u8, 3);

            let bin = '';
            for (let i = 0; i < compressed.length; i++) bin += String.fromCharCode(compressed[i]);
            document.getElementById('io-box').value = btoa(bin);
            log('Success: Code Exported.');
        } catch(e) {
            log('Export Error: ' + e.message);
        }
    };

    function renderSidebar() {
        const list = document.getElementById('container-list');
        list.innerHTML = '';
        window.currentData.forEach((c, i) => {
            const item = document.createElement('div');
            item.style = `background:#222; padding:8px; margin-top:5px; cursor:pointer; font-size:12px; border-left: 3px solid ${i === window.activeIndex ? '#ffcc33' : 'transparent'}`;
            item.innerHTML = c.NAME || 'Object';
            item.onclick = () => loadContainer(i);
            list.appendChild(item);
        });
    }

    function loadContainer(index) {
        window.activeIndex = index;
        renderSidebar();
        const editor = document.getElementById('node-editor');
        editor.innerHTML = '';
        const container = window.currentData[index];
        let nodes = [];
        try {
            const inner = typeof container.DATA === 'string' ? JSON.parse(container.DATA) : container.DATA;
            nodes = inner.Line || container.Line || [];
        } catch(e) { nodes = container.Line || []; }

        nodes.forEach((node, nIdx) => {
            const card = document.createElement('div');
            card.className = 'node-card';
            card.innerHTML = `<strong style="color:#ffcc33">${node.K_NAME}</strong>`;
            Object.keys(node).forEach(k => {
                if (k === 'K_NAME' || k === 'Preview') return;
                const row = document.createElement('div');
                row.innerHTML = `<label style="font-size:10px; color:#888">${k}</label>
                                 <input class="prop-input" value="${node[k]}" data-node="${nIdx}" data-key="${k}">`;
                card.appendChild(row);
            });
            editor.appendChild(card);
        });

        editor.querySelectorAll('.prop-input').forEach(input => {
            input.onchange = (e) => {
                const nIdx = e.target.getAttribute('data-node');
                const k = e.target.getAttribute('data-key');
                updateVal(nIdx, k, e.target.value);
            };
        });
    }

    function updateVal(nIdx, k, v) {
        const container = window.currentData[window.activeIndex];
        const val = isNaN(parseFloat(v)) ? v : parseFloat(v);
        if (container.DATA && typeof container.DATA === 'string') {
            let inner = JSON.parse(container.DATA);
            inner.Line[nIdx][k] = val;
            container.DATA = JSON.stringify(inner);
        } else {
            container.Line[nIdx][k] = val;
        }
        log('Updated ' + k);
    }

    init();
</script>
</body>
</html>
