<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JJS STUDIO V1.0.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">
    
    <!-- Using a more reliable backup provider -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fzstd/0.1.1/index.min.js"></script>

    <style>
        :root { 
            --bg: #0a0a0a; --panel: #141414; --accent: #ffcc33; 
            --text: #ffffff; --border: #333; --node-bg: #1a1a1a; 
        }
        * { font-family: 'Finger Paint', cursive; box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--text); margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }
        header { 
            background: var(--panel); padding: 10px 20px; border-bottom: 4px solid var(--accent); 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .logo { font-size: 1.4rem; color: var(--accent); }
        .layout { display: grid; grid-template-columns: 380px 1fr; flex: 1; overflow: hidden; }
        
        .sidebar { 
            background: var(--panel); border-right: 2px solid var(--border); 
            display: flex; flex-direction: column; padding: 15px; gap: 12px; overflow-y: auto; 
        }
        textarea { 
            width: 100%; height: 140px; background: #000; color: #00ff00; 
            border: 2px solid #333; padding: 12px; font-size: 11px; border-radius: 8px; 
            resize: none; outline: none; 
        }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { 
            border: none; padding: 14px; font-size: 0.85rem; cursor: pointer; 
            border-radius: 8px; font-weight: bold; transition: 0.2s; text-align: center; 
        }
        .import-btn { background: var(--accent); color: #000; }
        .export-btn { background: #28a745; color: #fff; }
        .copy-btn { background: #007bff; color: #fff; grid-column: span 2; }

        .main-view { overflow-y: auto; padding: 25px; background: #0c0c0c; }
        .node-card { 
            background: var(--node-bg); border: 2px solid var(--border); 
            border-radius: 12px; margin-bottom: 25px; 
        }
        .node-header { 
            background: #252525; padding: 10px 15px; border-radius: 10px 10px 0 0; 
            border-bottom: 2px solid var(--border);
        }
        .node-type { color: var(--accent); font-size: 0.9rem; }
        .node-body { padding: 20px; display: flex; flex-wrap: wrap; gap: 12px; }
        
        .prop-box { 
            background: #222; border: 1px solid #333; padding: 10px; 
            border-radius: 8px; flex: 1 1 160px; 
        }
        .label { color: var(--accent); font-size: 0.65rem; display: block; opacity: 0.8; margin-bottom: 5px; }
        .prop-input { 
            background: transparent; border: none; border-bottom: 2px solid #444; 
            color: #fff; width: 100%; font-size: 0.9rem; outline: none; 
        }

        .container-item { 
            background: #222; padding: 12px; border-radius: 10px; 
            cursor: pointer; border: 2px solid transparent; 
        }
        .container-item.active { border-color: var(--accent); background: #2a2a2a; }
        
        #debug-console { 
            position: fixed; bottom: 20px; right: 20px; width: 450px; height: 300px; 
            background: rgba(0,0,0,0.95); border: 2px solid var(--accent); border-radius: 10px; 
            z-index: 9999; display: none; flex-direction: column; 
        }
        #debug-body { 
            flex: 1; padding: 15px; font-family: monospace; font-size: 11px; 
            overflow-y: auto; color: #00ff00; 
        }
    </style>
</head>
<body>

<header>
    <div class="logo">JJS STUDIO V1.0.0</div>
    <div id="engine-status" style="font-size: 0.75rem; color: #ffcc33;">ENGINE: INITIALIZING</div>
</header>

<div class="layout">
    <div class="sidebar">
        <textarea id="io-box" placeholder="Paste KLUv code here..."></textarea>
        <div class="btn-group">
            <button class="btn import-btn" onclick="importKLUv()">IMPORT</button>
            <button class="btn export-btn" onclick="exportKLUv()">EXPORT</button>
            <button class="btn copy-btn" onclick="copyResult()">COPY CLIPBOARD</button>
        </div>
        <div id="container-list" style="margin-top: 10px; display: flex; flex-direction: column; gap: 8px;"></div>
    </div>
    <div class="main-view" id="node-editor">
        <div id="status-msg" style="display: flex; height: 100%; align-items: center; justify-content: center; color: #444;">
            Connecting to Decompression Engine...
        </div>
    </div>
</div>

<div id="debug-console">
    <div style="background:var(--accent); color:#000; padding:8px; font-size:11px; font-weight:bold;">SYSTEM CONSOLE</div>
    <div id="debug-body"></div>
</div>

<script>
    const log = (m) => {
        const b = document.getElementById('debug-body');
        if(b) { b.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${m}</div>`; b.scrollTop = b.scrollHeight; }
        console.log(m);
    };

    window.currentData = [];
    window.activeIndex = 0;

    // --- REBUILT BOOTSTRAPPER ---
    function checkEngine() {
        const statusEl = document.getElementById('engine-status');
        const msgEl = document.getElementById('status-msg');
        
        // Sometimes libraries name themselves differently in global scope
        const engine = window.fzstd || (window.exports && window.exports.fzstd);

        if (engine && engine.decompress) {
            window.fzstd = engine; // Ensure it's reachable at window.fzstd
            statusEl.innerText = "ENGINE: ONLINE";
            statusEl.style.color = "#28a745";
            msgEl.innerText = "Ready for Data Import.";
            log("Engine Found and Verified.");
        } else {
            log("Engine not found yet, retrying...");
            setTimeout(checkEngine, 500);
        }
    }

    window.onload = () => {
        log("Booting Studio...");
        checkEngine();
    };

    window.importKLUv = function() {
        let raw = document.getElementById('io-box').value.trim();
        if(!raw) return log("No data.");
        
        try {
            const binary = atob(raw);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            
            const decompressed = window.fzstd.decompress(bytes);
            const text = new TextDecoder().decode(decompressed);
            
            window.currentData = JSON.parse(text);
            if (!Array.isArray(window.currentData)) window.currentData = [window.currentData];
            
            renderSidebar();
            loadContainer(0);
            log("Import Successful.");
            document.getElementById('status-msg').style.display = 'none';
        } catch (e) { 
            log("Import Failure: " + e.message); 
        }
    };

    window.exportKLUv = function() {
        try {
            const jsonStr = JSON.stringify(window.currentData);
            const uint8 = new TextEncoder().encode(jsonStr);
            const compressed = window.fzstd.compress(uint8);
            
            let bin = "";
            for (let i = 0; i < compressed.length; i++) bin += String.fromCharCode(compressed[i]);
            document.getElementById('io-box').value = btoa(bin);
            log("Export Successful.");
        } catch (e) { log("Export Failure: " + e.message); }
    };

    window.renderSidebar = function() {
        const list = document.getElementById('container-list');
        list.innerHTML = '';
        window.currentData.forEach((c, i) => {
            const item = document.createElement('div');
            item.className = `container-item ${i === window.activeIndex ? 'active' : ''}`;
            item.innerHTML = `<strong>${c.NAME || 'Object'}</strong>`;
            item.onclick = () => loadContainer(i);
            list.appendChild(item);
        });
    };

    window.loadContainer = function(index) {
        window.activeIndex = index;
        renderSidebar();
        const editor = document.getElementById('node-editor');
        editor.innerHTML = '';
        const container = window.currentData[index];
        
        let nodes = [];
        try {
            const parsedData = typeof container.DATA === 'string' ? JSON.parse(container.DATA) : container.DATA;
            nodes = parsedData?.Line || container.Line || [];
        } catch(e) { nodes = container.Line || []; }

        nodes.forEach((node, nIdx) => {
            const card = document.createElement('div');
            card.className = 'node-card';
            let props = '';
            Object.keys(node).forEach(k => {
                if (k === 'K_NAME' || k === 'Preview') return;
                props += `<div class="prop-box"><span class="label">${k}</span>
                          <input class="prop-input" value="${node[k]}" onchange="updateVal(${nIdx},'${k}',this.value)"></div>`;
            });
            card.innerHTML = `<div class="node-header"><span class="node-type">${node.K_NAME}</span></div><div class="node-body">${props}</div>`;
            editor.appendChild(card);
        });
    };

    window.updateVal = function(nIdx, k, v) {
        const container = window.currentData[window.activeIndex];
        const val = isNaN(parseFloat(v)) ? v : parseFloat(v);
        if (container.DATA && typeof container.DATA === 'string') {
            let inner = JSON.parse(container.DATA);
            inner.Line[nIdx][k] = val;
            container.DATA = JSON.stringify(inner);
        } else if (container.Line) {
            container.Line[nIdx][k] = val;
        }
    };

    window.copyResult = function() {
        const box = document.getElementById('io-box');
        box.select();
        document.execCommand('copy');
        log("Copied to Clipboard.");
    };

    window.addEventListener('keydown', (e) => { 
        if(e.key === 'F2') { 
            const c = document.getElementById('debug-console');
            c.style.display = c.style.display === 'flex' ? 'none' : 'flex';
        }
    });
</script>
</body>
</html>
